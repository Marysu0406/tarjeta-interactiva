<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago con Tarjeta</title>

    <link rel="icon" type="image/png" href="assets/img/favicon.png">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark glass-nav">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">Examen <span class="fw-light">U2</span></a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
            </ul>
        </div>
    </div>
</nav>

<div class="container d-flex align-items-center justify-content-center my-5">
    <div class="glass-container row p-lg-5 p-4 g-5 align-items-center justify-content-between">
                
        <div class="col-lg-7 d-flex flex-column align-items-center justify-content-center">
            <div class="card-3d" id="card">
                <div class="card-inner">
                    <div class="card-front p-4">
                        <div class="d-flex justify-content-between">
                            <img src="https://raw.githubusercontent.com/muhammederdem/credit-card-form/master/src/assets/images/chip.png" width="50" alt="chip">
                            <h3 class="visa-logo">VISA</h3>
                        </div>
                        <div class="mt-5">
                            <h4 class="card-number-display" id="display-number">#### #### #### ####</h4>
                        </div>
                        <div class="d-flex justify-content-between mt-4">
                            <div>
                                <small>Titular</small>
                                <p class="mb-0" id="display-name">NOMBRE COMPLETO</p>
                            </div>
                            <div>
                                <small>Expira</small>
                                <p class="mb-0"><span id="display-month">MM</span>/<span id="display-year">AA</span></p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="card-back">
                        <div class="black-bar mt-4"></div>
                        <div class="p-4 mt-2">
                            <div class="cvv-area">
                                <div class="cvv-content">
                                    <small class="text-dark">CVV</small>
                                    <span class="text-dark fw-bold" id="display-cvv">***</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-5">
            <form id="card-form" class="text-white">
                <h2 class="mb-4">Detalles de Pago</h2>
                <div class="mb-3">
                    <label class="form-label">Número de Tarjeta</label>
                    <input type="text" id="input-number" class="form-control bg-transparent text-white custom-input" maxlength="19" placeholder="1234 5678 9101 1121">
                </div>
                <div class="mb-3">
                    <label class="form-label">Nombre del Titular</label>
                    <input type="text" id="input-name" class="form-control bg-transparent text-white custom-input" placeholder="Nombre completo del titular">
                </div>
                <div class="row">
                    <div class="col-4 mb-3">
                        <label class="form-label">Mes</label>
                        <select id="input-month" class="form-select custom-select">
                            <option value="" disabled selected>Mes</option>
                        </select>
                    </div>
                    <div class="col-4 mb-3">
                        <label class="form-label">Año</label>
                        <select id="input-year" class="form-select custom-select">
                            <option value="" disabled selected>Año</option>
                        </select>
                    </div>
                    <div class="col-4 mb-3">
                        <label class="form-label">CVV</label>
                        <input type="text" id="input-cvv" class="form-control bg-transparent text-white custom-input" maxlength="3" placeholder="123">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 mt-3 btn-pay">Pagar Ahora</button>
            </form>
        </div>

    </div>
</div>

<footer class="glass-footer py-4 mt-auto">
    <div class="container text-center text-white">
        <p class="mb-1 fw-bold">Hecho por  Maricarmen Suárez</p>
        <div class="opacity-50 mt-2" style="font-size: 0.7rem;">
            © 2026 Pachuca, Hidalgo 
        </div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/script.js"></script>
</body>
</html>
